spring:
  datasource:
    url: jdbc:h2:mem:linguaframe;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} jobId=%X{jobId:-} videoId=%X{videoId:-} stage=%X{stage:-} workerRole=%X{workerRole:-} - %msg%n"

management:
  health:
    rabbit:
      enabled: false

linguaframe:
  cost:
    enabled: true
    transcription-usd-per-minute: 0
    translation-input-usd-per-million-tokens: 0
    translation-output-usd-per-million-tokens: 0
    tts-usd-per-million-characters: 0
  worker:
    dispatch-enabled: false
    execution-enabled: false
    smoke-stage-failure-enabled: false
  ffmpeg:
    audio-enabled: false
    burn-in-enabled: false
  transcription:
    enabled: false
    provider: demo
    openai:
      api-key:
      model:
      base-url: https://api.openai.com
      timeout-seconds: 120
  translation:
    enabled: false
    provider: demo
    openai:
      api-key:
      model:
      base-url: https://api.openai.com
      timeout-seconds: 60
  tts:
    enabled: false
    provider: demo
    openai:
      api-key:
      model:
      voice:
      base-url: https://api.openai.com
      timeout-seconds: 120
