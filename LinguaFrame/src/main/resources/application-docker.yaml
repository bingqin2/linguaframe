server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} jobId=%X{jobId:-} videoId=%X{videoId:-} stage=%X{stage:-} workerRole=%X{workerRole:-} - %msg%n"

spring:
  application:
    name: LinguaFrame
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:linguaframe}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${MYSQL_USER:linguaframe}
    password: ${MYSQL_PASSWORD:linguaframe_dev_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:linguaframe}
    password: ${RABBITMQ_PASSWORD:linguaframe_dev_password}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

linguaframe:
  cost:
    enabled: ${LINGUAFRAME_COST_ENABLED:true}
    transcription-usd-per-minute: ${LINGUAFRAME_COST_TRANSCRIPTION_USD_PER_MINUTE:0}
    translation-input-usd-per-million-tokens: ${LINGUAFRAME_COST_TRANSLATION_INPUT_USD_PER_1M_TOKENS:0}
    translation-output-usd-per-million-tokens: ${LINGUAFRAME_COST_TRANSLATION_OUTPUT_USD_PER_1M_TOKENS:0}
    tts-usd-per-million-characters: ${LINGUAFRAME_COST_TTS_USD_PER_1M_CHARS:0}
    budget-guard-enabled: ${LINGUAFRAME_COST_BUDGET_GUARD_ENABLED:false}
    max-job-cost-usd: ${LINGUAFRAME_COST_MAX_JOB_COST_USD:0}
    daily-budget-guard-enabled: ${LINGUAFRAME_COST_DAILY_BUDGET_GUARD_ENABLED:false}
    max-daily-cost-usd: ${LINGUAFRAME_COST_MAX_DAILY_COST_USD:0}
    budget-identity: ${LINGUAFRAME_COST_BUDGET_IDENTITY:demo-owner}
  worker:
    max-retries: ${LINGUAFRAME_WORKER_MAX_RETRIES:2}
    stage-timeout-seconds: ${LINGUAFRAME_WORKER_STAGE_TIMEOUT_SECONDS:600}
    dispatch-enabled: ${LINGUAFRAME_WORKER_DISPATCH_ENABLED:true}
    dispatch-batch-size: ${LINGUAFRAME_WORKER_DISPATCH_BATCH_SIZE:10}
    dispatch-interval-ms: ${LINGUAFRAME_WORKER_DISPATCH_INTERVAL_MS:5000}
    execution-enabled: ${LINGUAFRAME_WORKER_EXECUTION_ENABLED:true}
    smoke-stage-duration-ms: ${LINGUAFRAME_WORKER_SMOKE_STAGE_DURATION_MS:0}
    smoke-stage-failure-enabled: ${LINGUAFRAME_WORKER_SMOKE_STAGE_FAILURE_ENABLED:false}
  demo:
    access-token: ${LINGUAFRAME_DEMO_ACCESS_TOKEN:}
    access-header-name: ${LINGUAFRAME_DEMO_ACCESS_HEADER_NAME:X-LinguaFrame-Demo-Token}
  retention:
    enabled: ${LINGUAFRAME_RETENTION_ENABLED:false}
    dry-run: ${LINGUAFRAME_RETENTION_DRY_RUN:true}
    completed-job-ttl-days: ${LINGUAFRAME_RETENTION_COMPLETED_JOB_TTL_DAYS:7}
    failed-job-ttl-days: ${LINGUAFRAME_RETENTION_FAILED_JOB_TTL_DAYS:3}
    cancelled-job-ttl-days: ${LINGUAFRAME_RETENTION_CANCELLED_JOB_TTL_DAYS:3}
    cleanup-batch-size: ${LINGUAFRAME_RETENTION_CLEANUP_BATCH_SIZE:25}
    scheduler-enabled: ${LINGUAFRAME_RETENTION_SCHEDULER_ENABLED:false}
    scheduler-interval-ms: ${LINGUAFRAME_RETENTION_SCHEDULER_INTERVAL_MS:3600000}
  ffmpeg:
    binary-path: ${LINGUAFRAME_FFMPEG_BINARY_PATH:ffmpeg}
    audio-enabled: ${LINGUAFRAME_FFMPEG_AUDIO_ENABLED:true}
    audio-timeout-seconds: ${LINGUAFRAME_FFMPEG_AUDIO_TIMEOUT_SECONDS:120}
    burn-in-enabled: ${LINGUAFRAME_FFMPEG_BURN_IN_ENABLED:true}
    burn-in-timeout-seconds: ${LINGUAFRAME_FFMPEG_BURN_IN_TIMEOUT_SECONDS:180}
    work-dir: ${LINGUAFRAME_FFMPEG_WORK_DIR:/tmp/linguaframe-media}
  transcription:
    enabled: ${LINGUAFRAME_TRANSCRIPTION_ENABLED:true}
    provider: ${LINGUAFRAME_TRANSCRIPTION_PROVIDER:demo}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_TRANSCRIPTION_MODEL:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      timeout-seconds: ${OPENAI_TRANSCRIPTION_TIMEOUT_SECONDS:120}
  translation:
    enabled: ${LINGUAFRAME_TRANSLATION_ENABLED:true}
    provider: ${LINGUAFRAME_TRANSLATION_PROVIDER:demo}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_TRANSLATION_MODEL:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      timeout-seconds: ${OPENAI_TRANSLATION_TIMEOUT_SECONDS:60}
  tts:
    enabled: ${LINGUAFRAME_TTS_ENABLED:false}
    provider: ${LINGUAFRAME_TTS_PROVIDER:demo}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_TTS_MODEL:}
      voice: ${OPENAI_TTS_VOICE:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      timeout-seconds: ${OPENAI_TTS_TIMEOUT_SECONDS:120}
  evaluation:
    enabled: ${LINGUAFRAME_EVALUATION_ENABLED:false}
    provider: ${LINGUAFRAME_EVALUATION_PROVIDER:demo}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_EVALUATION_MODEL:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      timeout-seconds: ${OPENAI_EVALUATION_TIMEOUT_SECONDS:60}
  openai-connectivity:
    enabled: ${LINGUAFRAME_OPENAI_CONNECTIVITY_CHECK_ENABLED:false}
    timeout-seconds: ${LINGUAFRAME_OPENAI_CONNECTIVITY_TIMEOUT_SECONDS:5}
    model: ${LINGUAFRAME_OPENAI_CONNECTIVITY_MODEL:}
  database:
    host: ${MYSQL_HOST:mysql}
    port: ${MYSQL_PORT:3306}
    name: ${MYSQL_DATABASE:linguaframe}
    username: ${MYSQL_USER:linguaframe}
    password: ${MYSQL_PASSWORD:linguaframe_dev_password}
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
  rate-limit:
    enabled: ${LINGUAFRAME_RATE_LIMIT_ENABLED:false}
    upload-max-requests: ${LINGUAFRAME_RATE_LIMIT_UPLOAD_MAX_REQUESTS:20}
    upload-window-seconds: ${LINGUAFRAME_RATE_LIMIT_UPLOAD_WINDOW_SECONDS:60}
    fail-open: ${LINGUAFRAME_RATE_LIMIT_FAIL_OPEN:true}
  job-status-cache:
    enabled: ${LINGUAFRAME_JOB_STATUS_CACHE_ENABLED:true}
    ttl-seconds: ${LINGUAFRAME_JOB_STATUS_CACHE_TTL_SECONDS:30}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:linguaframe}
    password: ${RABBITMQ_PASSWORD:linguaframe_dev_password}
    job-exchange: ${RABBITMQ_JOB_EXCHANGE:linguaframe.jobs}
    job-queue: ${RABBITMQ_JOB_QUEUE:linguaframe.localization.jobs}
    job-routing-key: ${RABBITMQ_JOB_ROUTING_KEY:localization.queued}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    bucket: ${MINIO_BUCKET:linguaframe-artifacts}
    access-key: ${MINIO_ROOT_USER:linguaframe}
    secret-key: ${MINIO_ROOT_PASSWORD:linguaframe_minio_password}
