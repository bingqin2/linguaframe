spring:
  application:
    name: LinguaFrame
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:linguaframe}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${MYSQL_USER:linguaframe}
    password: ${MYSQL_PASSWORD:linguaframe_dev_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:100MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

linguaframe:
  media:
    max-file-size-mb: ${LINGUAFRAME_MEDIA_MAX_FILE_SIZE_MB:100}
    max-duration-seconds: ${LINGUAFRAME_MEDIA_MAX_DURATION_SECONDS:120}
  worker:
    max-retries: 2
    stage-timeout-seconds: 600
  cost:
    enabled: true
  database:
    host: ${MYSQL_HOST:localhost}
    port: ${MYSQL_PORT:3306}
    name: ${MYSQL_DATABASE:linguaframe}
    username: ${MYSQL_USER:linguaframe}
    password: ${MYSQL_PASSWORD:linguaframe_dev_password}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:linguaframe}
    password: ${RABBITMQ_PASSWORD:linguaframe_dev_password}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    bucket: ${MINIO_BUCKET:linguaframe-artifacts}
    access-key: ${MINIO_ROOT_USER:linguaframe}
    secret-key: ${MINIO_ROOT_PASSWORD:linguaframe_minio_password}
