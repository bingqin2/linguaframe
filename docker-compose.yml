name: ${COMPOSE_PROJECT_NAME:-linguaframe}

x-backend-common: &backend-common
  build:
    context: .
    dockerfile: LinguaFrame/Dockerfile
  environment: &backend-environment
    SPRING_PROFILES_ACTIVE: docker
    SERVER_PORT: 8080
    SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:-100MB}
    SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:-100MB}
    LINGUAFRAME_MEDIA_MAX_FILE_SIZE_MB: ${LINGUAFRAME_MEDIA_MAX_FILE_SIZE_MB:-100}
    LINGUAFRAME_MEDIA_MAX_DURATION_SECONDS: ${LINGUAFRAME_MEDIA_MAX_DURATION_SECONDS:-120}
    LINGUAFRAME_DEMO_ACCESS_TOKEN: ${LINGUAFRAME_DEMO_ACCESS_TOKEN:-}
    LINGUAFRAME_DEMO_ACCESS_HEADER_NAME: ${LINGUAFRAME_DEMO_ACCESS_HEADER_NAME:-X-LinguaFrame-Demo-Token}
    LINGUAFRAME_DEMO_OWNER_ID: ${LINGUAFRAME_DEMO_OWNER_ID:-demo-owner}
    LINGUAFRAME_RATE_LIMIT_ENABLED: ${LINGUAFRAME_RATE_LIMIT_ENABLED:-false}
    LINGUAFRAME_RATE_LIMIT_UPLOAD_MAX_REQUESTS: ${LINGUAFRAME_RATE_LIMIT_UPLOAD_MAX_REQUESTS:-20}
    LINGUAFRAME_RATE_LIMIT_UPLOAD_WINDOW_SECONDS: ${LINGUAFRAME_RATE_LIMIT_UPLOAD_WINDOW_SECONDS:-60}
    LINGUAFRAME_RATE_LIMIT_FAIL_OPEN: ${LINGUAFRAME_RATE_LIMIT_FAIL_OPEN:-true}
    LINGUAFRAME_JOB_STATUS_CACHE_ENABLED: ${LINGUAFRAME_JOB_STATUS_CACHE_ENABLED:-true}
    LINGUAFRAME_JOB_STATUS_CACHE_TTL_SECONDS: ${LINGUAFRAME_JOB_STATUS_CACHE_TTL_SECONDS:-30}
    LINGUAFRAME_RETENTION_ENABLED: ${LINGUAFRAME_RETENTION_ENABLED:-false}
    LINGUAFRAME_RETENTION_DRY_RUN: ${LINGUAFRAME_RETENTION_DRY_RUN:-true}
    LINGUAFRAME_RETENTION_COMPLETED_JOB_TTL_DAYS: ${LINGUAFRAME_RETENTION_COMPLETED_JOB_TTL_DAYS:-7}
    LINGUAFRAME_RETENTION_FAILED_JOB_TTL_DAYS: ${LINGUAFRAME_RETENTION_FAILED_JOB_TTL_DAYS:-3}
    LINGUAFRAME_RETENTION_CANCELLED_JOB_TTL_DAYS: ${LINGUAFRAME_RETENTION_CANCELLED_JOB_TTL_DAYS:-3}
    LINGUAFRAME_RETENTION_CLEANUP_BATCH_SIZE: ${LINGUAFRAME_RETENTION_CLEANUP_BATCH_SIZE:-25}
    LINGUAFRAME_RETENTION_SCHEDULER_ENABLED: ${LINGUAFRAME_RETENTION_SCHEDULER_ENABLED:-false}
    LINGUAFRAME_RETENTION_SCHEDULER_INTERVAL_MS: ${LINGUAFRAME_RETENTION_SCHEDULER_INTERVAL_MS:-3600000}
    LINGUAFRAME_COST_ENABLED: ${LINGUAFRAME_COST_ENABLED:-true}
    LINGUAFRAME_COST_TRANSCRIPTION_USD_PER_MINUTE: ${LINGUAFRAME_COST_TRANSCRIPTION_USD_PER_MINUTE:-0}
    LINGUAFRAME_COST_TRANSLATION_INPUT_USD_PER_1M_TOKENS: ${LINGUAFRAME_COST_TRANSLATION_INPUT_USD_PER_1M_TOKENS:-0}
    LINGUAFRAME_COST_TRANSLATION_OUTPUT_USD_PER_1M_TOKENS: ${LINGUAFRAME_COST_TRANSLATION_OUTPUT_USD_PER_1M_TOKENS:-0}
    LINGUAFRAME_COST_TTS_USD_PER_1M_CHARS: ${LINGUAFRAME_COST_TTS_USD_PER_1M_CHARS:-0}
    LINGUAFRAME_COST_BUDGET_GUARD_ENABLED: ${LINGUAFRAME_COST_BUDGET_GUARD_ENABLED:-false}
    LINGUAFRAME_COST_MAX_JOB_COST_USD: ${LINGUAFRAME_COST_MAX_JOB_COST_USD:-0}
    LINGUAFRAME_COST_DAILY_BUDGET_GUARD_ENABLED: ${LINGUAFRAME_COST_DAILY_BUDGET_GUARD_ENABLED:-false}
    LINGUAFRAME_COST_MAX_DAILY_COST_USD: ${LINGUAFRAME_COST_MAX_DAILY_COST_USD:-0}
    LINGUAFRAME_COST_BUDGET_IDENTITY: ${LINGUAFRAME_COST_BUDGET_IDENTITY:-demo-owner}
    LINGUAFRAME_OWNER_QUOTA_ENABLED: ${LINGUAFRAME_OWNER_QUOTA_ENABLED:-false}
    LINGUAFRAME_OWNER_QUOTA_MAX_ACTIVE_JOBS: ${LINGUAFRAME_OWNER_QUOTA_MAX_ACTIVE_JOBS:-0}
    LINGUAFRAME_OWNER_QUOTA_MAX_QUEUED_JOBS: ${LINGUAFRAME_OWNER_QUOTA_MAX_QUEUED_JOBS:-0}
    LINGUAFRAME_OWNER_QUOTA_DAILY_BUDGET_GUARD_ENABLED: ${LINGUAFRAME_OWNER_QUOTA_DAILY_BUDGET_GUARD_ENABLED:-false}
    LINGUAFRAME_OWNER_QUOTA_MAX_DAILY_COST_USD: ${LINGUAFRAME_OWNER_QUOTA_MAX_DAILY_COST_USD:-0}
    LINGUAFRAME_WORKER_DISPATCH_ENABLED: ${LINGUAFRAME_WORKER_DISPATCH_ENABLED:-true}
    LINGUAFRAME_WORKER_DISPATCH_BATCH_SIZE: ${LINGUAFRAME_WORKER_DISPATCH_BATCH_SIZE:-10}
    LINGUAFRAME_WORKER_DISPATCH_INTERVAL_MS: ${LINGUAFRAME_WORKER_DISPATCH_INTERVAL_MS:-5000}
    LINGUAFRAME_WORKER_MAX_RETRIES: ${LINGUAFRAME_WORKER_MAX_RETRIES:-2}
    LINGUAFRAME_WORKER_EXECUTION_ENABLED: ${LINGUAFRAME_WORKER_EXECUTION_ENABLED:-true}
    LINGUAFRAME_WORKER_ROLE: ${LINGUAFRAME_WORKER_ROLE:-COMBINED}
    LINGUAFRAME_WORKER_SMOKE_STAGE_DURATION_MS: ${LINGUAFRAME_WORKER_SMOKE_STAGE_DURATION_MS:-0}
    LINGUAFRAME_WORKER_SMOKE_STAGE_FAILURE_ENABLED: ${LINGUAFRAME_WORKER_SMOKE_STAGE_FAILURE_ENABLED:-false}
    LINGUAFRAME_FFMPEG_BINARY_PATH: ${LINGUAFRAME_FFMPEG_BINARY_PATH:-ffmpeg}
    LINGUAFRAME_FFMPEG_AUDIO_ENABLED: ${LINGUAFRAME_FFMPEG_AUDIO_ENABLED:-true}
    LINGUAFRAME_FFMPEG_AUDIO_TIMEOUT_SECONDS: ${LINGUAFRAME_FFMPEG_AUDIO_TIMEOUT_SECONDS:-120}
    LINGUAFRAME_FFMPEG_BURN_IN_ENABLED: ${LINGUAFRAME_FFMPEG_BURN_IN_ENABLED:-true}
    LINGUAFRAME_FFMPEG_BURN_IN_TIMEOUT_SECONDS: ${LINGUAFRAME_FFMPEG_BURN_IN_TIMEOUT_SECONDS:-180}
    LINGUAFRAME_FFMPEG_WORK_DIR: ${LINGUAFRAME_FFMPEG_WORK_DIR:-/tmp/linguaframe-media}
    LINGUAFRAME_TRANSCRIPTION_ENABLED: ${LINGUAFRAME_TRANSCRIPTION_ENABLED:-true}
    LINGUAFRAME_TRANSCRIPTION_PROVIDER: ${LINGUAFRAME_TRANSCRIPTION_PROVIDER:-demo}
    LINGUAFRAME_TRANSLATION_ENABLED: ${LINGUAFRAME_TRANSLATION_ENABLED:-true}
    LINGUAFRAME_TRANSLATION_PROVIDER: ${LINGUAFRAME_TRANSLATION_PROVIDER:-demo}
    LINGUAFRAME_TTS_ENABLED: ${LINGUAFRAME_TTS_ENABLED:-false}
    LINGUAFRAME_TTS_PROVIDER: ${LINGUAFRAME_TTS_PROVIDER:-demo}
    LINGUAFRAME_EVALUATION_ENABLED: ${LINGUAFRAME_EVALUATION_ENABLED:-false}
    LINGUAFRAME_EVALUATION_PROVIDER: ${LINGUAFRAME_EVALUATION_PROVIDER:-demo}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-}
    OPENAI_TRANSCRIPTION_TIMEOUT_SECONDS: ${OPENAI_TRANSCRIPTION_TIMEOUT_SECONDS:-120}
    OPENAI_TRANSLATION_MODEL: ${OPENAI_TRANSLATION_MODEL:-}
    OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
    OPENAI_TRANSLATION_TIMEOUT_SECONDS: ${OPENAI_TRANSLATION_TIMEOUT_SECONDS:-60}
    OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-}
    OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-}
    OPENAI_TTS_TIMEOUT_SECONDS: ${OPENAI_TTS_TIMEOUT_SECONDS:-120}
    OPENAI_EVALUATION_MODEL: ${OPENAI_EVALUATION_MODEL:-}
    OPENAI_EVALUATION_TIMEOUT_SECONDS: ${OPENAI_EVALUATION_TIMEOUT_SECONDS:-60}
    MYSQL_HOST: mysql
    MYSQL_DATABASE: ${MYSQL_DATABASE:-linguaframe}
    MYSQL_USER: ${MYSQL_USER:-linguaframe}
    MYSQL_PASSWORD: ${MYSQL_PASSWORD:-linguaframe_dev_password}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    RABBITMQ_HOST: rabbitmq
    RABBITMQ_PORT: 5672
    RABBITMQ_USER: ${RABBITMQ_USER:-linguaframe}
    RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-linguaframe_dev_password}
    RABBITMQ_JOB_EXCHANGE: ${RABBITMQ_JOB_EXCHANGE:-linguaframe.jobs}
    RABBITMQ_JOB_QUEUE: ${RABBITMQ_JOB_QUEUE:-linguaframe.localization.jobs}
    RABBITMQ_JOB_ROUTING_KEY: ${RABBITMQ_JOB_ROUTING_KEY:-localization.queued}
    RABBITMQ_FFMPEG_JOB_QUEUE: ${RABBITMQ_FFMPEG_JOB_QUEUE:-linguaframe.localization.jobs}
    RABBITMQ_OPENAI_JOB_QUEUE: ${RABBITMQ_OPENAI_JOB_QUEUE:-linguaframe.localization.openai.jobs}
    RABBITMQ_FFMPEG_JOB_ROUTING_KEY: ${RABBITMQ_FFMPEG_JOB_ROUTING_KEY:-localization.queued}
    RABBITMQ_OPENAI_JOB_ROUTING_KEY: ${RABBITMQ_OPENAI_JOB_ROUTING_KEY:-localization.openai}
    RABBITMQ_LISTENER_QUEUE: ${RABBITMQ_LISTENER_QUEUE:-linguaframe.localization.jobs}
    MINIO_ENDPOINT: http://minio:9000
    MINIO_BUCKET: ${MINIO_BUCKET:-linguaframe-artifacts}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER:-linguaframe}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-linguaframe_minio_password}
  depends_on: &backend-dependencies
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    minio:
      condition: service_started

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-linguaframe}
      MYSQL_USER: ${MYSQL_USER:-linguaframe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-linguaframe_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-linguaframe_root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-linguaframe}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-linguaframe_dev_password}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-linguaframe}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-linguaframe_minio_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  linguaframe-backend:
    <<: *backend-common
    environment:
      <<: *backend-environment
      LINGUAFRAME_WORKER_ROLE: ${LINGUAFRAME_WORKER_ROLE:-COMBINED}
      RABBITMQ_LISTENER_QUEUE: ${RABBITMQ_LISTENER_QUEUE:-linguaframe.localization.jobs}
    ports:
      - "${LINGUAFRAME_BACKEND_PORT:-8080}:8080"

  linguaframe-worker-ffmpeg:
    <<: *backend-common
    profiles: ["split-workers"]
    environment:
      <<: *backend-environment
      LINGUAFRAME_WORKER_ROLE: FFMPEG
      LINGUAFRAME_WORKER_DISPATCH_ENABLED: "false"
      LINGUAFRAME_WORKER_EXECUTION_ENABLED: "true"
      RABBITMQ_LISTENER_QUEUE: ${RABBITMQ_FFMPEG_JOB_QUEUE:-linguaframe.localization.jobs}

  linguaframe-worker-openai:
    <<: *backend-common
    profiles: ["split-workers"]
    environment:
      <<: *backend-environment
      LINGUAFRAME_WORKER_ROLE: OPENAI
      LINGUAFRAME_WORKER_DISPATCH_ENABLED: "false"
      LINGUAFRAME_WORKER_EXECUTION_ENABLED: "true"
      RABBITMQ_LISTENER_QUEUE: ${RABBITMQ_OPENAI_JOB_QUEUE:-linguaframe.localization.openai.jobs}

  linguaframe-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      LINGUAFRAME_API_PROXY_TARGET: http://linguaframe-backend:8080
    ports:
      - "${LINGUAFRAME_FRONTEND_PORT:-5173}:5173"
    depends_on:
      - linguaframe-backend

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:
