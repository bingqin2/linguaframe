name: ${COMPOSE_PROJECT_NAME:-linguaframe}

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-linguaframe}
      MYSQL_USER: ${MYSQL_USER:-linguaframe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-linguaframe_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-linguaframe_root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-linguaframe}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-linguaframe_dev_password}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-linguaframe}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-linguaframe_minio_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  linguaframe-backend:
    build:
      context: .
      dockerfile: LinguaFrame/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:-100MB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:-100MB}
      LINGUAFRAME_MEDIA_MAX_FILE_SIZE_MB: ${LINGUAFRAME_MEDIA_MAX_FILE_SIZE_MB:-100}
      LINGUAFRAME_MEDIA_MAX_DURATION_SECONDS: ${LINGUAFRAME_MEDIA_MAX_DURATION_SECONDS:-120}
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE:-linguaframe}
      MYSQL_USER: ${MYSQL_USER:-linguaframe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-linguaframe_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-linguaframe}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-linguaframe_dev_password}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-linguaframe-artifacts}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-linguaframe}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-linguaframe_minio_password}
    ports:
      - "${LINGUAFRAME_BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:
